<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Toolbar -->
        <header class="toolbar">
            <div class="toolbar-left">
                <div class="tool-group">
                    <button id="btnPen" class="icon-tool-btn active" title="Pen"><i class="bi bi-pencil-fill"></i></button>
                    <button id="btnEraser" class="icon-tool-btn" title="Eraser"><i class="bi bi-eraser-fill"></i></button>
                    <button id="btnSelect" class="icon-tool-btn" title="Select"><i class="bi bi-cursor-fill"></i></button>
                    <button id="btnText" class="icon-tool-btn" title="Text"><i class="bi bi-type"></i></button>
                </div>
                <div class="v-divider"></div>
                <div class="tool-group">
                    <button id="btnUndo" class="icon-tool-btn" title="Undo"><i class="bi bi-arrow-counterclockwise"></i></button>
                    <button id="btnRedo" class="icon-tool-btn" title="Redo"><i class="bi bi-arrow-clockwise"></i></button>
                </div>
                <div class="v-divider"></div>
                <div id="layoutToggle" class="layout-toggle">
                    <button id="btnLayoutPDF" class="layout-btn active" title="A4 Portrait (PDF)"><i class="bi bi-file-earmark-pdf"></i></button>
                    <button id="btnLayoutPPT" class="layout-btn" title="Widescreen 16:9 (PPT)"><i class="bi bi-display"></i></button>
                </div>
                <div class="v-divider"></div>
                <div class="ocr-group">
                    <select id="ocrLanguage" class="language-select">
                        <option value="en">English</option>
                        <option value="ml">Malayalam</option>
                    </select>
                    <div class="v-divider"></div>
                    <label class="toggle-btn" title="Append to last text">
                        <input type="checkbox" id="chkAppendOCR">
                        <span class="toggle-label">Append</span>
                    </label>
                    <button id="btnOCR" class="premium-btn" title="OCR Handwriting to Text">
                        <i class="bi bi-magic"></i>
                        <span>Convert</span>
                    </button>
                </div>
            </div>

            <div class="toolbar-center">
                <div class="page-switcher">
                    <button id="btnPrev" class="nav-arrow"><i class="bi bi-chevron-left"></i></button>
                    <span id="pageIndicator">1 / 1</span>
                    <button id="btnNext" class="nav-arrow"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>

            <div class="toolbar-right">

                <button id="btnDownload" class="premium-btn secondary" title="Download PDF">
                    <i class="bi bi-file-earmark-pdf-fill"></i>
                    <span>PDF</span>
                </button>
                <button id="btnDownloadPPT" class="premium-btn secondary" title="Download PPT">
                    <i class="bi bi-file-earmark-ppt-fill"></i>
                    <span>PPT</span>
                </button>
                <div class="v-divider"></div>
                <button id="btnAddPage" class="action-btn success" title="Add Page"><i class="bi bi-plus-lg"></i></button>
                <button id="btnDeletePage" class="action-btn danger" title="Delete Page"><i class="bi bi-dash-lg"></i></button>
                <div class="v-divider"></div>
                <button id="btnClear" class="action-btn danger" title="Clear Canvas"><i class="bi bi-trash3-fill"></i></button>
            </div>
        </header>

        <!-- Tool Properties Bar -->
        <div class="properties-bar" id="toolProperties">
            <div id="penProperties" class="prop-group">
                <span class="prop-label">Pen Color</span>
                <input type="color" id="penColor" value="#000000" class="color-picker-sm">
                <div class="color-presets">
                    <button class="color-swatch" style="background: #000000" onclick="setPenColor('#000000')"></button>
                    <button class="color-swatch" style="background: #ffffff; border: 1px solid #ddd;" onclick="setPenColor('#ffffff')" title="Whiteout"></button>
                </div>
                <div class="v-divider"></div>
                <span class="prop-label">Size</span>
                <input type="range" id="penSize" min="0.8" max="20" step="0.1" value="2.0">
                <span class="prop-value" id="penSizeValue">2.0</span>
            </div>
            <div id="textProperties" class="prop-group" style="display: none;">
                <span class="prop-label">Default Color</span>
                <input type="color" id="textColor" value="#1d1d1f" class="color-picker-sm">
                <div class="v-divider"></div>
                <span class="prop-label">Default Size</span>
                <input type="range" id="textSize" min="10" max="72" step="1" value="18">
                <span class="prop-value" id="textSizeValue">18</span>
            </div>
        </div>

        <!-- Canvas Area -->
        <main class="canvas-container">
            <div class="a4-sheet" id="a4Sheet">
                <canvas id="drawingCanvas"></canvas>
                
                <!-- OCR Loading Overlay -->
                <div id="ocrOverlay" class="ocr-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <span id="ocrStatus">Recognizing Text...</span>
                </div>

                <!-- Inline Text Editor Overlay -->
                <div id="textEditorOverlay" class="text-editor-overlay" style="display: none;">
                    <div id="inlineEditor" contenteditable="true" spellcheck="false"></div>
                </div>

                <!-- Floating Text Formatting Toolbar -->
                <div id="floatingFormatToolbar" class="text-format-toolbar" style="display: none;">
                    <div class="toolbar-main">
                        <div class="toolbar-row">
                            <select id="fmtFontFamily" class="fmt-select font-family" title="Font Family">
                                <option value="Inter">Inter</option>
                                <option value="Arial">Arial</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Malayalam">Malayalam</option>
                            </select>
                            <select id="fmtFontSize" class="fmt-select font-size" title="Font Size">
                                <option value="12">12</option>
                                <option value="14">14</option>
                                <option value="18">18</option>
                                <option value="24">24</option>
                                <option value="36">36</option>
                                <option value="48">48</option>
                                <option value="60">60</option>
                                <option value="72">72</option>
                            </select>
                            <button id="fmtSizeUp" title="Increase Size"><i class="bi bi-type-h1"></i></button>
                            <button id="fmtSizeDown" title="Decrease Size"><i class="bi bi-type-h3"></i></button>
                            <div class="v-divider"></div>
                            <button id="fmtIndentDecrease" title="Decrease Indent"><i class="bi bi-text-indent-left"></i></button>
                            <button id="fmtIndentIncrease" title="Increase Indent"><i class="bi bi-text-indent-right"></i></button>
                        </div>
                        <div class="toolbar-row">
                            <button id="fmtBold" title="Bold"><i class="bi bi-type-bold"></i></button>
                            <button id="fmtItalic" title="Italic"><i class="bi bi-type-italic"></i></button>
                            <button id="fmtUnderline" title="Underline"><i class="bi bi-type-underline"></i></button>
                            <div class="v-divider"></div>
                            <button id="fmtAlignLeft" title="Align Left"><i class="bi bi-text-left"></i></button>
                            <button id="fmtAlignCenter" title="Align Center"><i class="bi bi-text-center"></i></button>
                            <button id="fmtAlignRight" title="Align Right"><i class="bi bi-text-right"></i></button>
                            <div class="v-divider"></div>
                            <div class="color-tool" title="Highlight Color">
                                <i class="bi bi-pencil-fill"></i>
                                <input type="color" id="fmtBgColor" value="#ffff00">
                                <div class="color-indicator bg" id="bgColorIndicator"></div>
                            </div>
                            <div class="color-tool" title="Text Color">
                                <i class="bi bi-type"></i>
                                <input type="color" id="fmtColor" value="#000000">
                                <div class="color-indicator text" id="textColorIndicator"></div>
                            </div>
                            <button id="fmtClear" title="Clear Formatting"><i class="bi bi-eraser-fill"></i></button>
                            <div class="v-divider"></div>
                            <button id="fmtBullet" title="Bullet List"><i class="bi bi-list-ul"></i></button>
                            <button id="fmtEdit" title="Edit Text"><i class="bi bi-pencil-square"></i></button>
                            <button id="fmtDelete" title="Delete Text" class="danger-icon"><i class="bi bi-trash3-fill"></i></button>
                        </div>
                    </div>
                    <div class="toolbar-side">
                        <button id="fmtComment" class="side-btn">
                            <i class="bi bi-chat-left-text-fill"></i>
                            <span>New<br>Comment</span>
                        </button>
                    </div>
                </div>

                <!-- Hidden Input for Mobile Keyboard -->
                <textarea id="imeTextInput" class="hidden-input"></textarea>
            </div>
        </main>

        <!-- Footer / Status Bar -->
        <footer class="status-bar">
            <div class="status-item">
                <i class="bi bi-hdd-fill"></i>
                <span id="storageStatus">Auto-saving to LocalStorage</span>
            </div>
            <div class="status-item" id="fileSizeInfo">
                Size: 0 KB
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
